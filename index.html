<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>固定资产系统</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
  font-family: Arial;
  background:#f5f5f5;
  padding:20px;
}

.card{
  background:white;
  padding:15px;
  border-radius:10px;
  margin-bottom:10px;
  cursor:pointer;
}

.title{
  font-weight:bold;
}

.small{
  color:#666;
  font-size:12px;
}
</style>
</head>

<body>

<div id="app">加载中...</div>

<script>

function getText(v){
  if (!v) return "-";
  if (typeof v === "string" || typeof v === "number") return v;
  if (Array.isArray(v)) return getText(v[0]);
  if (v.text) return v.text;
  if (v.name) return v.name;
  return "-";
}

function getId(){
  const url = new URL(location.href);
  return url.searchParams.get("id");
}

// =====================
// 列表
// =====================
async function loadList(){

  const res = await fetch("/api/record?type=list");
  const json = await res.json();

  document.getElementById("app").innerHTML =
    json.data.map(i => `
      <div class="card" onclick="go('${i.id}')">
        <div class="title">${i.编号} - ${i.名称}</div>
        <div class="small">${i.状态}</div>
      </div>
    `).join("");
}

// =====================
// 详情
// =====================
async function loadDetail(id){

  const res = await fetch(`/api/record?id=${id}`);
  const json = await res.json();

  const d = json.data;

  document.getElementById("app").innerHTML = `
    <div class="card">
      <div class="title">📦 ${d.资产名称}</div>
      <p>编号：${d.资产编号}</p>
      <p>类别：${d.资产类别}</p>
      <p>状态：${d.状态}</p>
      <p>部门：${d.使用部门}</p>
      <p>负责人：${d.负责人}</p>
      <p>价格：${d.购置价格}</p>
    </div>
  `;
}

// =====================
function go(id){
  location.href = "?id=" + id;
}

// =====================
const id = getId();

if (id) {
  loadDetail(id);
} else {
  loadList();
}

</script>

</body>
</html>
