```html
<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>资产管理系统</title>

<style>
* {
    box-sizing: border-box;
}

body {
    margin: 0;
    padding: 20px;
    background: #f5f7fb;
    font-family: -apple-system, BlinkMacSystemFont, sans-serif;
    color: #1e293b;
}

.header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 24px;
}

h1 {
    margin: 0;
    font-size: 28px;
}

button {
    border: none;
    border-radius: 8px;
    padding: 10px 18px;
    cursor: pointer;
    background: #2563eb;
    color: white;
    font-size: 14px;
}

button:hover {
    opacity: .9;
}

.logout-btn {
    background: #64748b;
}

.hidden {
    display: none;
}

.record-list {
    background: white;
    border-radius: 12px;
    overflow: hidden;
    box-shadow: 0 1px 3px rgba(0,0,0,.1);
}

.record-item {
    padding: 16px 20px;
    border-bottom: 1px solid #e2e8f0;
    cursor: pointer;
}

.record-item:hover {
    background: #f8fafc;
}

.record-item.selected {
    background: #eff6ff;
    border-left: 4px solid #2563eb;
}

.record-title {
    font-weight: 600;
}

.record-sub {
    margin-top: 4px;
    color: #64748b;
    font-size: 13px;
}

.detail-panel {
    background: white;
    margin-top: 24px;
    border-radius: 12px;
    padding: 24px;
    box-shadow: 0 1px 3px rgba(0,0,0,.1);
}

.grid {
    display: grid;
    grid-template-columns: repeat(2,1fr);
    gap: 16px;
}

.field-group label {
    display: block;
    margin-bottom: 6px;
    font-weight: 500;
}

input {
    width: 100%;
    padding: 10px;
    border: 1px solid #cbd5e1;
    border-radius: 8px;
}

.readonly {
    padding: 10px;
    background: #f8fafc;
    border-radius: 8px;
    border: 1px solid #e2e8f0;
}

.loading {
    padding: 40px;
    text-align: center;
    color: #64748b;
}

.error {
    background: #fee2e2;
    color: #b91c1c;
    padding: 12px;
    border-radius: 8px;
    margin-bottom: 20px;
}

.note {
    margin-top: 20px;
    color: #64748b;
    font-size: 13px;
}
</style>
</head>

<body>

<div class="header">
    <h1>📦 资产管理</h1>

    <div>
        <span id="userInfo">未登录</span>

        <button id="loginBtn">
            飞书登录
        </button>

        <button
            id="logoutBtn"
            class="logout-btn hidden"
        >
            退出
        </button>
    </div>
</div>

<div id="listContainer" class="record-list">
    <div class="loading">
        加载中...
    </div>
</div>

<div
    id="detailContainer"
    class="detail-panel hidden"
>
    <h3>资产详情</h3>

    <div id="detailFields"></div>

    <div
        id="editActions"
        class="hidden"
        style="margin-top:20px;"
    >
        <button id="saveBtn">
            保存修改
        </button>
    </div>
</div>

<div class="note">
    未登录只能查看公开字段，登录后可查看并编辑全部信息
</div>

<script>

const APP_ID = 'cli_a9744fcb1a391cc8';

/*
  关键修复：
  redirect_uri 必须是前端页面
*/
const REDIRECT_URI = window.location.origin;

let accessToken =
    localStorage.getItem('accessToken') || '';

let isLoggedIn = !!accessToken;

let currentRecordId = null;

const loginBtn =
    document.getElementById('loginBtn');

const logoutBtn =
    document.getElementById('logoutBtn');

const userInfo =
    document.getElementById('userInfo');

const listContainer =
    document.getElementById('listContainer');

const detailContainer =
    document.getElementById('detailContainer');

const detailFields =
    document.getElementById('detailFields');

const editActions =
    document.getElementById('editActions');

function escapeHtml(str) {
    return String(str || '')
        .replace(/&/g,'&amp;')
        .replace(/</g,'&lt;')
        .replace(/>/g,'&gt;');
}

function getFieldValue(field) {

    if (field === null || field === undefined)
        return '';

    if (typeof field === 'string')
        return field;

    if (typeof field === 'number')
        return String(field);

    if (Array.isArray(field)) {
        return field
            .map(item => {
                if (item?.text)
                    return item.text;

                if (item?.name)
                    return item.name;

                return String(item);
            })
            .join(', ');
    }

    if (typeof field === 'object') {

        if (field.text)
            return field.text;

        if (field.name)
            return field.name;

        return JSON.stringify(field);
    }

    return String(field);
}

function showError(msg) {

    const div = document.createElement('div');

    div.className = 'error';

    div.innerText = msg;

    document.body.prepend(div);

    setTimeout(() => {
        div.remove();
    }, 4000);
}

function updateUI() {

    if (isLoggedIn) {

        userInfo.innerText = '✅ 已登录';

        loginBtn.classList.add('hidden');

        logoutBtn.classList.remove('hidden');

    } else {

        userInfo.innerText = '未登录';

        loginBtn.classList.remove('hidden');

        logoutBtn.classList.add('hidden');
    }
}

async function api(url, options = {}) {

    const headers = {
        ...(options.headers || {})
    };

    if (accessToken) {
        headers.Authorization =
            `Bearer ${accessToken}`;
    }

    const res = await fetch(url, {
        ...options,
        headers
    });

    const json = await res.json();

    if (json.code !== 0) {
        throw new Error(
            json.message || '请求失败'
        );
    }

    return json.data;
}

async function handleAuthCallback() {

    const params =
        new URLSearchParams(location.search);

    const code = params.get('code');

    if (!code)
        return;

    try {

        const data = await api('/api/login', {
            method: 'POST',
            headers: {
                'Content-Type':
                    'application/json'
            },
            body: JSON.stringify({
                code
            })
        });

        accessToken = data.accessToken;

        localStorage.setItem(
            'accessToken',
            accessToken
        );

        isLoggedIn = true;

        /*
          去掉 URL 中 code
        */
        history.replaceState(
            {},
            '',
            location.pathname
        );

    } catch (err) {

        console.error(err);

        showError(
            '登录失败：' + err.message
        );
    }
}

function startLogin() {

    const url =
        'https://open.feishu.cn/open-apis/authen/v1/authorize';

    /*
      scope 可按需增加
    */
    const scope =
        'offline_access';

    const authUrl =
        `${url}?app_id=${APP_ID}` +
        `&redirect_uri=${encodeURIComponent(REDIRECT_URI)}` +
        `&scope=${encodeURIComponent(scope)}`;

    location.href = authUrl;
}

function logout() {

    localStorage.removeItem('accessToken');

    accessToken = '';

    isLoggedIn = false;

    currentRecordId = null;

    detailContainer.classList.add('hidden');

    updateUI();

    loadList();
}

async function loadList() {

    listContainer.innerHTML =
        '<div class="loading">加载中...</div>';

    try {

        const records =
            await api('/api/record?type=list');

        if (!records || !records.length) {

            listContainer.innerHTML =
                '<div class="loading">暂无数据</div>';

            return;
        }

        listContainer.innerHTML = '';

        records.forEach(record => {

            const div =
                document.createElement('div');

            div.className =
                'record-item';

            if (record.id === currentRecordId) {
                div.classList.add('selected');
            }

            const title =
                getFieldValue(
                    record['资产名称']
                ) || '未命名';

            const code =
                getFieldValue(
                    record['资产编号']
                ) || '-';

            const status =
                getFieldValue(
                    record['资产状态']
                ) || '-';

            div.innerHTML = `
                <div class="record-title">
                    ${escapeHtml(title)}
                </div>

                <div class="record-sub">
                    编号: ${escapeHtml(code)}
                    ｜ 状态: ${escapeHtml(status)}
                </div>
            `;

            div.onclick = () => {
                loadDetail(record.id);
            };

            listContainer.appendChild(div);
        });

    } catch (err) {

        console.error(err);

        listContainer.innerHTML =
            `<div class="error">${escapeHtml(err.message)}</div>`;
    }
}

async function loadDetail(id) {

    currentRecordId = id;

    detailContainer.classList.remove('hidden');

    detailFields.innerHTML =
        '<div class="loading">加载详情...</div>';

    try {

        const record =
            await api(
                `/api/record?type=detail&id=${id}`
            );

        if (isLoggedIn) {
            renderEditable(record);
        } else {
            renderReadonly(record);
        }

    } catch (err) {

        detailFields.innerHTML =
            `<div class="error">${escapeHtml(err.message)}</div>`;
    }
}

function renderReadonly(record) {

    const fields = [
        '资产名称',
        '资产编号',
        '资产状态'
    ];

    let html = '<div class="grid">';

    fields.forEach(key => {

        html += `
            <div class="field-group">
                <label>${key}</label>

                <div class="readonly">
                    ${escapeHtml(
                        getFieldValue(record[key])
                    )}
                </div>
            </div>
        `;
    });

    html += '</div>';

    detailFields.innerHTML = html;

    editActions.classList.add('hidden');
}

function renderEditable(record) {

    const fields = [
        '资产名称',
        '资产编号',
        '资产类别',
        '购置价格',
        '使用部门',
        '资产状态'
    ];

    let html = '<div class="grid">';

    fields.forEach(key => {

        html += `
            <div class="field-group">

                <label>${key}</label>

                <input
                    id="field_${key}"
                    value="${escapeHtml(
                        getFieldValue(record[key])
                    )}"
                />

            </div>
        `;
    });

    html += '</div>';

    detailFields.innerHTML = html;

    editActions.classList.remove('hidden');

    const saveBtn =
        document.getElementById('saveBtn');

    const newBtn =
        saveBtn.cloneNode(true);

    saveBtn.replaceWith(newBtn);

    newBtn.onclick = async () => {

        const updated = {};

        fields.forEach(key => {

            updated[key] =
                document.getElementById(
                    `field_${key}`
                ).value;
        });

        try {

            await api(
                '/api/record?action=update',
                {
                    method: 'POST',
                    headers: {
                        'Content-Type':
                            'application/json'
                    },
                    body: JSON.stringify({
                        id: currentRecordId,
                        fields: updated
                    })
                }
            );

            alert('保存成功');

            await loadList();

            await loadDetail(
                currentRecordId
            );

        } catch (err) {

            alert(
                '保存失败：' + err.message
            );
        }
    };
}

async function init() {

    updateUI();

    await handleAuthCallback();

    updateUI();

    await loadList();

    loginBtn.onclick = startLogin;

    logoutBtn.onclick = logout;
}

init();

</script>

</body>
</html>
